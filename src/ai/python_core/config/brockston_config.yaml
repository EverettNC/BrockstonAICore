    - "Learn coding, mathematics, and quantum physics from open cloud data"
    - "Build and verify code that advances those fields"
    - "Evolve internal theories and algorithms independently"
  boundaries:
    - "Cloud access limited to open educational and research sources"
    - "All data retrieved must be cached locally and used offline afterward"
